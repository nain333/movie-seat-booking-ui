<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seat Booking App</title>
    <link rel="stylesheet" href="index.css">
    <script defer src="index.js"></script>

</head>

<body>
    <section id="seat-legend">
        <div class="legendContainer">
            <div class="legendItem">
                <div class="seat available">


                </div>

                <small class="text">Available</small>
            </div>
            <div class="legendItem">
                <div class="seat selected ">


                </div>
                <small class="text">Selected</small>
            </div>
            <div class="legendItem">
                <div class="seat occupied">


                </div>
                <small class="text">Occupied</small>


            </div>
        </div>


    </section>
    <section id="theater">
        <div class="screenWrapper">
            <div class=screen>
                <small>S C R E E N</small>

            </div>
        </div>
        <div class="seatGridWrapper">
           <div class="seatGrid">
  <!-- Row 1 -->
  <div class="seat"></div>
  <div class="seat"></div>

  <div class="aisle"></div>

  <div class="seat"></div>
  <div class="seat"></div>
  <div class="seat"></div>
  <div class="seat"></div>

  <div class="aisle"></div>

  <div class="seat"></div>
  <div class="seat"></div>

  <!-- Row 2 (repeat same pattern) -->
  <div class="seat"></div>
  <div class="seat"></div>

  <div class="aisle"></div>

  <div class="seat"></div>
  <div class="seat"></div>
  <div class="seat"></div>
  <div class="seat"></div>

  <div class="aisle"></div>

  <div class="seat"></div>
  <div class="seat"></div>
</div>


    </section>



</body>

</html>
