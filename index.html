<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seat Booking App</title>
    <link rel="stylesheet" href="index.css">
    <script defer src="index.js"></script>

</head>

<body>
    <section id="seat-legend">
        <div class="legendContainer">
            <div class="legendItem">
                <div class="seat available">


                </div>

                <small class="text">Available</small>
            </div>
            <div class="legendItem">
                <div class="seat selected ">


                </div>
                <small class="text">Selected</small>
            </div>
            <div class="legendItem">
                <div class="seat occupied">


                </div>
                <small class="text">Occupied</small>


            </div>
        </div>


    </section>
    <section id="theater">
        <div class="screenWrapper">
            <div class=screen>
                <small>S C R E E N</small>

            </div>
        </div>


    </section>

    <script src="https://kit.fontawesome.com/d08ac5d23e.js" crossorigin="anonymous"></script>
</body>

</html>
