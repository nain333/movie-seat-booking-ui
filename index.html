<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seat Booking App</title>
    <link rel="stylesheet" href="index.css">
    <script defer src="index.js"></script>

</head>

<body>
    <div class="container">
        <div class="leftContainer">

            <section id="seat-legend">
                <div class="legendContainer">
                    <div class="legendItem">
                        <div class="seat available">


                        </div>

                        <small class="text">Available</small>
                    </div>
                    <div class="legendItem">
                        <div class="seat selected ">


                        </div>
                        <small class="text">Selected</small>
                    </div>
                    <div class="legendItem">
                        <div class="seat occupied">


                        </div>
                        <small class="text">Occupied</small>


                    </div>
                </div>


            </section>
            <section id="theater">
                <div class="screenWrapper">
                    <div class="screen">
                        <small>S C R E E N</small>

                    </div>
                </div>
                <div class="seatGridWrapper">


                    <div class="seatGrid">

                    </div>





                </div>



            </section>
        </div>
        <div class="rightContainer">
            <aside class="summary">
                <aside class="summary">

                    <!-- Top Section -->
                     <div class="top">
                        <div class="movieSelect">
                            <p>Select Movie</p> 
                           
                        </div>

                        <div class="movieInfo">
                            <p>Movie Name</p>
                            <h3 id="movieName">Flash</h3>
                        </div>

                        <div class="moviePrice">
                            <p>Movie Price</p>
                            <h3 id="moviePrice">₹150</h3>
                        </div>
                    </div> 

                    <!-- Bottom Section -->
                     <div class="bottom">

                        <div class="selectedSeats">

                            <p>Selected Seats</p>
                            <div class="seatSummary">
                                <hr>
                                <small>No seat Selected</small>

                                <hr>

                            </div>
                            <div id="selectedSeats"></div>
                        </div>

                        <div class="summaryRow">
                            <span id="count">0</span> Seats
                            <span id="total">₹0</span>
                        </div>

                        <div class="buttons">
                            <button>Cancel</button>
                            <button>Continue</button>
                        </div>

                    </div> 

                </aside>
        </div>


    </div>



</body>

</html>
